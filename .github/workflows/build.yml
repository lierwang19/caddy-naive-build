name: Build Caddy with NaiveProxy

# 触发条件：当你手动点击运行，或者向仓库推送代码时
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest # 使用 GitHub 提供的最新 Ubuntu 环境
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22' # 指定 Go 版本
        check-latest: true

    - name: Install xcaddy
      run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

    - name: Build Caddy with Naive
      env:
        GOOS: linux
        GOARCH: amd64 # 绝大多数 VPS 都是 amd64 架构，如果是 ARM 机器请改为 arm64
      run: |
        ~/go/bin/xcaddy build \
        --with github.com/caddyserver/forwardproxy@caddy2=github.com/klzgrad/forwardproxy@naive

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: caddy-linux-amd64
        path: caddy # 将编译好的单文件上传
        retention-days: 7 # 保存 7 天
